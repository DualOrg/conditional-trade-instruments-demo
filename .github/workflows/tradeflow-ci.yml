name: TradeFlow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Start local TradeFlow server
        run: |
          npm start > /tmp/tradeflow-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4176 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/tradeflow-server.log
          exit 1

      - name: Smoke test local app
        run: npm run smoke
        env:
          DEMO_BASE_URL: http://127.0.0.1:4176

      - name: Re-derive public proof hashes locally
        run: npm run proof:rederive -- http://127.0.0.1:4176
